name: Fix chat videos (pad audio)

on:
  workflow_dispatch:
    inputs:
      latest:
        description: "How many latest video messages to process"
        required: false
        default: "20"
      force:
        description: "Force remux even if durations look OK (one-off/manual runs)"
        required: false
        default: "false"
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"

concurrency:
  group: fix-chat-videos
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Opt into Node.js 24 for JS-based actions early (GitHub runner deprecation notice).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_URL:-}" ]]; then
            echo "::error::Missing GitHub Actions secret SUPABASE_URL"
            exit 1
          fi
          if [[ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]]; then
            echo "::error::Missing GitHub Actions secret SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi
          echo "Secrets look present."

      - name: Install ffmpeg + ffprobe
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version
          ffprobe -version

      - name: Install deps (minimal)
        run: |
          npm ci

      - name: Process latest videos
        run: |
          FORCE_FLAG=""
          if [[ "${{ github.event.inputs.force || 'false' }}" == "true" ]]; then
            FORCE_FLAG="--force"
          fi
          node scripts/process-chat-videos.mjs --latest "${{ github.event.inputs.latest || '20' }}" $FORCE_FLAG

