name: Fix chat videos (pad audio)

on:
  workflow_dispatch:
    inputs:
      latest:
        description: "How many latest video messages to process"
        required: false
        default: "20"
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"

concurrency:
  group: fix-chat-videos
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install ffmpeg + ffprobe
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version
          ffprobe -version

      - name: Install deps (minimal)
        working-directory: GameMessengerMobile
        run: |
          npm ci

      - name: Process latest videos
        working-directory: GameMessengerMobile
        run: |
          node scripts/process-chat-videos.mjs --latest "${{ github.event.inputs.latest || '20' }}"

